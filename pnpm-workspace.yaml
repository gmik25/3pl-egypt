packages:
  - "apps/*"
  - "packages/*"

# Allow post-install build scripts for trusted, well-known packages.
# @prisma/* and argon2 are required (native binaries).
# esbuild is required for Vite.
# @nestjs/core runs an install hint script.
allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  argon2: true
  esbuild: true
  # optional native accelerator for bullmq's msgpackr; pure-JS fallback is fine
  msgpackr-extract: false
  prisma: true
